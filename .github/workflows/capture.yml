name: Qoo10 Megapo Capture

on:
  schedule:
    - cron: '45 * * * *'   # hourly ranking (JST every hour at :45; 23:45 run also saves ranking screenshot)
    - cron: '30 0 * * *'   # daily 00:30 UTC = 09:30 JST event page full screenshot
  workflow_dispatch:
    inputs:
      mode:
        description: 'ranking or screenshot'
        required: false
        default: 'ranking'

concurrency:
  group: capture
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Check event period
        id: period
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%F)
          RANGE=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2} *~ *[0-9]{4}-[0-9]{2}-[0-9]{2}' event_config.txt | head -1 || true)
          START=$(echo "$RANGE" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)
          END=$(echo "$RANGE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}$' || true)
          echo "today=$TODAY start=$START end=$END"
          RUN=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run: period check bypassed"
          elif [ -n "$END" ] && [ "$TODAY" \> "$END" ]; then
            RUN=false
            echo "event ended ($END) -> disabling workflow"
            gh api -X PUT "repos/${{ github.repository }}/actions/workflows/capture.yml/disable"
          elif [ -n "$START" ] && [ "$TODAY" \< "$START" ]; then
            RUN=false
            echo "event not started yet ($START) -> skip"
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/setup-node@v4
        if: steps.period.outputs.run == 'true'
        with:
          node-version: 20

      - name: Determine mode
        id: mode
        if: steps.period.outputs.run == 'true'
        run: |
          MODE="ranking"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "30 0 * * *" ]; then
            MODE="screenshot"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Install Playwright
        if: steps.period.outputs.run == 'true'
        run: |
          npm install playwright@1
          npx playwright install --with-deps chromium

      - name: Capture
        if: steps.period.outputs.run == 'true'
        run: node scripts/capture.mjs ${{ steps.mode.outputs.mode }}

      - name: Keepalive (prevent 60-day auto-disable)
        if: steps.period.outputs.run == 'true' && github.event_name == 'schedule'
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/capture.yml/enable"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit results
        if: steps.period.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "capture(${{ steps.mode.outputs.mode }}): $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
            git pull --rebase
            git push
          fi
