name: Qoo10 Megapo Capture

on:
  schedule:
    - cron: '45 * * * *'   # hourly ranking (JST every hour at :45; 23:45 run also saves ranking screenshot)
    - cron: '15 * * * *'   # backup tick: captures only if the :45 tick was missed (guard in period step)
    - cron: '30 0 * * *'   # daily 00:30 UTC = 09:30 JST event page full screenshot
  workflow_dispatch:
    inputs:
      mode:
        description: 'ranking / screenshot / prewarm (cache warmup, no CSV)'
        required: false
        default: 'ranking'
      force:
        description: 'true = bypass event period check'
        required: false
        default: 'false'

concurrency:
  group: capture
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Check event period
        id: period
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%F)
          RANGE=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2} *~ *[0-9]{4}-[0-9]{2}-[0-9]{2}' event_config.txt | head -1 || true)
          START=$(echo "$RANGE" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)
          END=$(echo "$RANGE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}$' || true)
          echo "today=$TODAY start=$START end=$END"
          RUN=true
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "forced run: period check bypassed"
          elif [ -n "$END" ] && [ "$TODAY" \> "$END" ]; then
            RUN=false
            echo "event ended ($END) -> skip (no disable; external trigger may call year-round)"
          elif [ -n "$START" ] && [ "$TODAY" \< "$START" ]; then
            RUN=false
            echo "event not started yet ($START) -> skip"
          fi
          # cron ranking ticks are backup to the external :46 dispatch: skip if captured within 40 min
          # (daily screenshot cron '30 0 * * *' is exempt — it must run regardless of ranking captures)
          if [ "$RUN" = "true" ] && [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" != "30 0 * * *" ] && [ -f data/last_run.json ]; then
            LAST=$(jq -r '.captured // empty' data/last_run.json)
            if [ -n "$LAST" ]; then
              DIFF=$(( $(date +%s) - $(TZ=Asia/Tokyo date -d "$LAST" +%s) ))
              echo "last capture: $LAST JST (${DIFF}s ago)"
              if [ "$DIFF" -lt 2400 ]; then
                RUN=false
                echo "recent capture exists -> cron backup not needed"
              fi
            fi
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.period.outputs.run == 'true'
        with:
          node-version: 20

      - name: Determine mode
        id: mode
        if: steps.period.outputs.run == 'true'
        run: |
          MODE="ranking"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "30 0 * * *" ]; then
            MODE="screenshot"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Install Playwright
        if: steps.period.outputs.run == 'true'
        run: |
          npm install playwright@1
          npx playwright install --with-deps chromium

      - name: Capture
        if: steps.period.outputs.run == 'true'
        run: node scripts/capture.mjs ${{ steps.mode.outputs.mode }}

      # NOTE: keepalive(enable API) 단계는 제거함 — 매 실행마다 스케줄 재등록을 유발해
      # cron이 ~6시간씩 정지하는 원인으로 의심(2026-07-08 관측). 이벤트는 10일 이내 +
      # 매 이벤트 수동 Enable이므로 60일 자동 비활성은 애초에 해당 없음.
      - name: Commit results
        if: steps.period.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "capture(${{ steps.mode.outputs.mode }}): $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
            git pull --rebase
            git push
          fi
